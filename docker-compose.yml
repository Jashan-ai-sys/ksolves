services:
  # Main agent — processes all 20 tickets
  agent:
    build: .
    env_file: .env
    volumes:
      - ./output:/app/output
      - ./hackathon_data:/app/hackathon_data
    command: python main.py --fresh --batch-size 4 --batch-delay 30

  # Real-time audit dashboard
  dashboard:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
    command: uvicorn dashboard:app --host 0.0.0.0 --port 8000
    depends_on:
      - agent
